[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "open-sesame"
version = "0.1.0"
description = "Self-hostable captcha/token-solving microservice"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "Cascading Labs" }]
dependencies = [
  "httpx>=0.27",
  "pydantic>=2",
  "rich-click>=1.7",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]
# Live browser driving (challenge engines). OpenSesame consumes a VoidCrawl page;
# it never launches a browser itself.
live = [
  "voidcrawl>=0.3.4",
]
# Local audio transcription (reCAPTCHA audio side-door).
ml-audio = [
  "torch>=2.0",
  "transformers>=4.57",
]
# Local vision/OCR inference (grid tile classification, OCR captchas).
ml-vision = [
  "pillow>=12",
  "torch>=2.0",
  "transformers>=4.57",
]

[project.scripts]
opensesame = "OpenSesame.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.hatch.build.targets.wheel]
packages = ["src/OpenSesame"]

# src layout: tell type checkers (pyright/basedpyright) where the package lives,
# so `import OpenSesame` resolves without installing the package.
[tool.pyright]
extraPaths = ["src"]
include = ["src", "tests", "examples"]

[tool.basedpyright]
extraPaths = ["src"]
include = ["src", "tests", "examples"]
