name: Generate & Publish API Docs

on:
  push:
    tags:
      - "*"
  workflow_dispatch: {}

jobs:
  generate-docs:
    name: Generate API reference and push to OpenSesameDocs
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout OpenSesame
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Determine version
        id: version
        run: echo "tag=${GITHUB_REF_NAME:-$(python -c 'import tomllib; print(tomllib.load(open(\"pyproject.toml\", \"rb\"))[\"project\"][\"version\"])')}" >> "$GITHUB_OUTPUT"

      - name: Generate API reference
        run: |
          uv run --extra dev python scripts/generate_api_docs.py \
            --output opensesame/reference/api-reference.md \
            --version "${{ steps.version.outputs.tag }}" \
            --ref "${{ steps.version.outputs.tag }}"

      - name: Upload generated docs
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: api-reference
          path: opensesame/reference/api-reference.md

      - name: Clone OpenSesameDocs and push
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git clone "https://x-access-token:${DOCS_DEPLOY_TOKEN}@github.com/CascadingLabs/OpenSesameDocs.git" opensesame-docs-repo
          mkdir -p opensesame-docs-repo/opensesame/reference
          cp opensesame/reference/api-reference.md opensesame-docs-repo/opensesame/reference/api-reference.md
          rm -f opensesame-docs-repo/api-reference.md
          rm -rf opensesame-docs-repo/reference

          cd opensesame-docs-repo
          git add -A api-reference.md reference opensesame/reference/api-reference.md

          if git diff --cached --quiet; then
            echo "No changes to API reference - skipping commit"
          else
            git commit -m "docs: update API reference for ${TAG}"
            git push origin main
            echo "Pushed API reference to OpenSesameDocs"
          fi

          git tag -f "${TAG}"
          git push origin "${TAG}"
          echo "Tagged OpenSesameDocs with ${TAG}"

      - name: Trigger docs update in CascadingLabsFE
        env:
          DOCS_DEPLOY_TOKEN: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DOCS_DEPLOY_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/CascadingLabs/CascadingLabsFE/dispatches \
            -d "{\"event_type\": \"update-opensesame-docs\", \"client_payload\": {\"tag\": \"${TAG}\"}}"
